<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="900" fill="#FBF7F0"/>
  <text x="86" y="110" fill="#1F2A44" font-size="46" font-family="Georgia, 'Noto Serif SC', serif" font-weight="700">Hermes 的 5 层结构</text>
  <text x="86" y="156" fill="#667085" font-size="22" font-family="'Segoe UI', 'PingFang SC', sans-serif">从最贴近用户的记忆层，到最底部的运行层，职责不要混放。</text>

  <rect x="90" y="210" width="1020" height="105" rx="24" fill="#163D5B"/>
  <text x="130" y="272" fill="#F7F2EA" font-size="30" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-weight="700">1. 身份与记忆层</text>
  <text x="500" y="272" fill="#DDE7EF" font-size="24" font-family="'Segoe UI', 'PingFang SC', sans-serif">USER.md / MEMORY.md / profiles / AGENTS.md</text>

  <rect x="120" y="340" width="960" height="105" rx="24" fill="#1C5C56"/>
  <text x="160" y="402" fill="#F7F2EA" font-size="30" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-weight="700">2. 感知与抓取层</text>
  <text x="500" y="402" fill="#DDEEEB" font-size="24" font-family="'Segoe UI', 'PingFang SC', sans-serif">web-fetch / search / doc-reader / MCP servers</text>

  <rect x="150" y="470" width="900" height="105" rx="24" fill="#A43F31"/>
  <text x="190" y="532" fill="#FFF2EC" font-size="30" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-weight="700">3. 模型与调用层</text>
  <text x="500" y="532" fill="#FFE3D9" font-size="24" font-family="'Segoe UI', 'PingFang SC', sans-serif">providers / API keys / default.yaml / fallback.yaml</text>

  <rect x="180" y="600" width="840" height="105" rx="24" fill="#C88C2A"/>
  <text x="220" y="662" fill="#FFF8E7" font-size="30" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-weight="700">4. 入口与连接层</text>
  <text x="500" y="662" fill="#FFF0C8" font-size="24" font-family="'Segoe UI', 'PingFang SC', sans-serif">wechat / telegram / api gateway / sessions</text>

  <rect x="210" y="730" width="780" height="105" rx="24" fill="#1F2A44"/>
  <text x="250" y="792" fill="#F4EFE9" font-size="30" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-weight="700">5. 运行与隔离层</text>
  <text x="500" y="792" fill="#D7DCE7" font-size="24" font-family="'Segoe UI', 'PingFang SC', sans-serif">venv / logs / tmp / container / runtime</text>

  <path d="M600 316V338" stroke="#1F2A44" stroke-width="4" stroke-dasharray="8 8"/>
  <path d="M600 446V468" stroke="#1F2A44" stroke-width="4" stroke-dasharray="8 8"/>
  <path d="M600 576V598" stroke="#1F2A44" stroke-width="4" stroke-dasharray="8 8"/>
  <path d="M600 706V728" stroke="#1F2A44" stroke-width="4" stroke-dasharray="8 8"/>
</svg>
