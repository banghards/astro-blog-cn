<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#173A5F"/>
      <stop offset="1" stop-color="#10243B"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2A6B64"/>
      <stop offset="1" stop-color="#194743"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A64D3F"/>
      <stop offset="1" stop-color="#7A3429"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#CB8B2B"/>
      <stop offset="1" stop-color="#9B6720"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2B3247"/>
      <stop offset="1" stop-color="#191F31"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="#FBF7F0"/>
  <circle cx="1030" cy="106" r="92" fill="#D95A3A" fill-opacity="0.12"/>
  <text x="84" y="110" fill="#1F2A44" font-size="48" font-family="Georgia, 'Noto Serif SC', serif" font-weight="700">Hermes 不是一个工具，是 5 层叠起来的系统</text>
  <text x="84" y="156" fill="#667085" font-size="22" font-family="'Segoe UI', 'PingFang SC', sans-serif">图要帮助理解结构，但也要像一篇完整内容，而不是白板截图。</text>

  <g transform="translate(86 214)">
    <rect width="1028" height="92" rx="24" fill="url(#g1)"/>
    <text x="34" y="56" fill="#F3EFE8" font-size="31" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-weight="700">1. 身份与记忆层</text>
    <text x="516" y="56" fill="#D7E2EE" font-size="22" font-family="'Segoe UI', 'PingFang SC', sans-serif">USER.md / MEMORY.md / profiles / AGENTS.md</text>
  </g>
  <g transform="translate(126 334)">
    <rect width="948" height="92" rx="24" fill="url(#g2)"/>
    <text x="34" y="56" fill="#F3EFE8" font-size="31" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-weight="700">2. 感知与抓取层</text>
    <text x="516" y="56" fill="#DDEEEB" font-size="22" font-family="'Segoe UI', 'PingFang SC', sans-serif">web-fetch / search / doc-reader / MCP servers</text>
  </g>
  <g transform="translate(166 454)">
    <rect width="868" height="92" rx="24" fill="url(#g3)"/>
    <text x="34" y="56" fill="#FFF1EA" font-size="31" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-weight="700">3. 模型与调用层</text>
    <text x="516" y="56" fill="#FFDCD0" font-size="22" font-family="'Segoe UI', 'PingFang SC', sans-serif">providers / API keys / routing</text>
  </g>
  <g transform="translate(206 574)">
    <rect width="788" height="92" rx="24" fill="url(#g4)"/>
    <text x="34" y="56" fill="#FFF8E7" font-size="31" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-weight="700">4. 入口与连接层</text>
    <text x="484" y="56" fill="#FFF0C8" font-size="22" font-family="'Segoe UI', 'PingFang SC', sans-serif">wechat / telegram / api gateway</text>
  </g>
  <g transform="translate(246 694)">
    <rect width="708" height="92" rx="24" fill="url(#g5)"/>
    <text x="34" y="56" fill="#F2EEE8" font-size="31" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-weight="700">5. 运行与隔离层</text>
    <text x="430" y="56" fill="#D7DCE7" font-size="22" font-family="'Segoe UI', 'PingFang SC', sans-serif">venv / logs / tmp / container</text>
  </g>
  <path d="M600 306V334" stroke="#1F2A44" stroke-width="4" stroke-dasharray="9 9"/>
  <path d="M600 426V454" stroke="#1F2A44" stroke-width="4" stroke-dasharray="9 9"/>
  <path d="M600 546V574" stroke="#1F2A44" stroke-width="4" stroke-dasharray="9 9"/>
  <path d="M600 666V694" stroke="#1F2A44" stroke-width="4" stroke-dasharray="9 9"/>
</svg>
