<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="900" fill="#FBF7F0"/>
  <circle cx="1010" cy="124" r="92" fill="#D95A3A" fill-opacity="0.12"/>
  <text x="80" y="104" fill="#1F2A44" font-size="48" font-family="Georgia, 'Noto Serif SC', serif" font-weight="700">微信入口、Hermes 本体、运行环境，最好分三层住</text>
  <text x="80" y="150" fill="#667085" font-size="22" font-family="'Segoe UI', 'PingFang SC', sans-serif">这一张不只是告诉你“怎么连微信”，而是告诉你它该住在哪，避免以后维护一起炸。</text>

  <rect x="90" y="270" width="204" height="120" rx="22" fill="#C88C2A"/>
  <text x="148" y="340" fill="#FFF8E7" font-size="34" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-weight="700">用户</text>

  <rect x="356" y="232" width="274" height="190" rx="26" fill="#A44C3E"/>
  <text x="392" y="298" fill="#FFF2EC" font-size="31" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-weight="700">微信入口层</text>
  <text x="392" y="338" fill="#FFDCD0" font-size="22" font-family="'Segoe UI', 'PingFang SC', sans-serif">~/hermes-gateways/wechat/</text>
  <text x="392" y="372" fill="#FFDCD0" font-size="22" font-family="'Segoe UI', 'PingFang SC', sans-serif">app.py / .env / sessions</text>

  <rect x="694" y="206" width="418" height="242" rx="26" fill="#173A5F"/>
  <text x="732" y="282" fill="#F5F0E9" font-size="31" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-weight="700">Hermes 本体</text>
  <text x="732" y="322" fill="#D8E2EE" font-size="22" font-family="'Segoe UI', 'PingFang SC', sans-serif">~/.hermes/memories/</text>
  <text x="732" y="355" fill="#D8E2EE" font-size="22" font-family="'Segoe UI', 'PingFang SC', sans-serif">~/.hermes/providers/</text>
  <text x="732" y="388" fill="#D8E2EE" font-size="22" font-family="'Segoe UI', 'PingFang SC', sans-serif">configs / profiles / accounts</text>

  <rect x="326" y="564" width="786" height="186" rx="28" fill="#22293E"/>
  <text x="366" y="634" fill="#F2EEE8" font-size="31" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-weight="700">运行与隔离层</text>
  <text x="366" y="674" fill="#D7DCE7" font-size="24" font-family="'Segoe UI', 'PingFang SC', sans-serif">~/hermes-runtime/venv</text>
  <text x="366" y="708" fill="#D7DCE7" font-size="24" font-family="'Segoe UI', 'PingFang SC', sans-serif">logs / tmp / container / scheduler</text>

  <path d="M294 330H356" stroke="#1F2A44" stroke-width="5" stroke-linecap="round"/>
  <path d="M630 330H694" stroke="#1F2A44" stroke-width="5" stroke-linecap="round"/>
  <path d="M820 448V564" stroke="#1F2A44" stroke-width="5" stroke-dasharray="10 10"/>

  <rect x="90" y="564" width="196" height="186" rx="24" fill="#F4E9DC" stroke="#A44C3E" stroke-width="3"/>
  <text x="120" y="626" fill="#A44C3E" font-size="29" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-weight="700">别这么配</text>
  <text x="120" y="674" fill="#475467" font-size="22" font-family="'Segoe UI', 'PingFang SC', sans-serif">把微信入口</text>
  <text x="120" y="706" fill="#475467" font-size="22" font-family="'Segoe UI', 'PingFang SC', sans-serif">直接塞进主环境</text>
</svg>
