    <text x="258" y="108" font-size="36" font-weight="700" fill="#FFF9F1">第三层：Advanced Systems</text>
    <text x="258" y="146" font-size="24" fill="#FFF9F1">模板、自动检查点、持续上下文、周期复盘</text>
