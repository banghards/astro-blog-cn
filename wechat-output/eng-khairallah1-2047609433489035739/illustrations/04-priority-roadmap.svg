  <g transform="translate(160 220)" font-family="'Microsoft YaHei', sans-serif">
    <rect x="0" y="360" width="980" height="160" rx="26" fill="#FFF9F1" stroke="#111111" stroke-width="3"/>
    <text x="42" y="430" font-size="40" font-weight="700">第一层：Quick Wins</text>
